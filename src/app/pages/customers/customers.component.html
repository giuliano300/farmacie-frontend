<nav aria-label="breadcrumb" class="position-relative">
    <ol class="breadcrumb">
        <li aria-current="page" class="breadcrumb-item active">Clienti</li>
    </ol>
</nav>
<mat-card
    class="trinta-card to-do-list-card mb-25 bg-white border-none d-block"
>
    <mat-card-content>
        <div class="to-do-list-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <!-- Name Column -->
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef class="pl-0 mini">
                            Id
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0 mini" data-label="Id">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.customer.id}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Nome
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Nome">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.customer.name}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="magentoStoreCode">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Codice Store Magento
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Codice Store Magento">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.customer.magentoStoreCode }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="active">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Attivo
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Attivo">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.customer.active ? "SI": "NO" }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="import">

                        <th mat-header-cell *matHeaderCellDef class="text-center">
                            Import
                        </th>

                        <td mat-cell *matCellDef="let element" class="text-center">

                        <div class="import-status">

                            <!-- stato running -->
                            <span *ngIf="element.stepStatus === 1" class="running-label">
                                 <span class="traffic-light"></span>
                                in corso
                            </span>

                            <button *ngIf="element.stepStatus == null"
                                    mat-flat-button
                                    color="primary"
                                    (click)="import(element.customer.id)">
                                <i class="fa-solid fa-plus"></i>
                                Crea nuovo
                            </button>

                            <!-- riavvia -->
                            <button *ngIf="element.stepStatus === 3"
                                    mat-flat-button
                                    color="primary"
                                    (click)="restart(element)">
                                <i class="fa-solid fa-rotate"></i>
                                Riavvia
                            </button>

                            <!-- avvia -->
                            <button *ngIf="element.stepStatus === 0"
                                    mat-flat-button
                                    color="primary"
                                    (click)="start(element)">
                                <i class="fa-solid fa-play"></i>
                                Avvia
                            </button>

                        </div>

                        </td>
                    </ng-container>                    
                    <ng-container matColumnDef="currentStep">
                        <th mat-header-cell *matHeaderCellDef class="text-center pl-0 mini">
                            Step corrente
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pl-0 mini" data-label="Step corrente">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.currentStep ?? 'Nessuno step in corso' }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef class="text-center pr-0">
                            Azioni
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0" data-label="Azioni">
                            <div class="action">
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="dettagli" matTooltipPosition="above" (click)="openDetails(element.customer)">
                                    <i class="{{element.action.details}}"></i>
                                </button>
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="modifica" matTooltipPosition="above" (click)="updateCustomer(element.customer.id)">
                                    <i class="{{element.action.update}}"></i>
                                </button>
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="elimina" matTooltipPosition="above" (click)="DeleteItem(element.customer)">
                                    <i class="{{element.action.delete}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[20, 50, 100]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
