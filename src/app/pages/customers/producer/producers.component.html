<header class="page-header-card">
    <div><span class="page-eyebrow">Mapping catalogo</span><h1>Produttori<span *ngIf="customer?.customer?.name"> — {{customer?.customer?.name}}</span></h1><p>Gestisci le corrispondenze dei produttori configurate per {{customer?.customer?.name || 'questo cliente'}}.</p></div>
    <div class="header-actions">
        <button class="btn btn-secondary" (click)="update()"><i *ngIf="isUpdating" class="fa fa-spinner fa-spin"></i> Aggiorna produttori</button>
        <button class="btn btn-primary" (click)="addproducer()"><i class="ri-add-line"></i> Aggiungi produttori</button>
    </div>
</header>
<mat-card
    class="trinta-card to-do-list-card mb-25 bg-white border-none d-block"
>
    <mat-card-content>
        <div class="to-do-list-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <!-- Name Column -->
                    <ng-container matColumnDef="managementLabel">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Produttore Gestionale
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Produttore Gestionale">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.managementLabel}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="magentoLabel">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Produttore Magento
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Produttore Magento">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.magentoLabel }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef class="text-center pr-0">
                            Azioni
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0" data-label="Azioni">
                            <div class="action">
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="elimina" matTooltipPosition="above" (click)="DeleteItem(element)">
                                    <i class="{{element.action.delete}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell text-center no-data" [attr.colspan]="displayedColumns.length">
                            Nessun produttore inserito
                        </td>
                    </tr>

                </table>
            </div>
            <div class="progress">
                <mat-progress-bar *ngIf="firstLoading" mode="indeterminate"></mat-progress-bar>
            </div>

            <mat-paginator [pageSizeOptions]="[20, 50, 100]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
