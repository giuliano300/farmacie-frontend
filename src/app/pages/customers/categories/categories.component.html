<nav aria-label="breadcrumb" class="position-relative">
    <ol class="breadcrumb">
        <li aria-current="page" class="breadcrumb-item active">Categorie del cliente {{customer?.customer?.name}}</li>
    </ol>
    <button class="btn-download btn btn-primary" (click)="addCategory()"><i class="ri-add-line"></i> Aggiungi categoria</button>
</nav>
<mat-card
    class="trinta-card to-do-list-card mb-25 bg-white border-none d-block"
>
    <mat-card-content>
        <div class="to-do-list-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <!-- Name Column -->
                    <ng-container matColumnDef="sourceCategory">
                        <th mat-header-cell *matHeaderCellDef class="pl-0 mini">
                            Categoria
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0 mini" data-label="Categoria">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.sourceCategory}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="sourceSubCategory">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Sotto Categoria
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Sotto Categoria">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.sourceSubCategory}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="targetCategory">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Categoria Target
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Categoria Target">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.targetCategory }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="targetSubCategory">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Sotto Categoria Target
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Sotto Categoria Target">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.targetSubCategory }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef class="text-center pr-0">
                            Azioni
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0" data-label="Azioni">
                            <div class="action">
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="modifica" matTooltipPosition="above" (click)="updateCategory(element)">
                                    <i class="{{element.action.update}}"></i>
                                </button>
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="elimina" matTooltipPosition="above" (click)="DeleteItem(element)">
                                    <i class="{{element.action.delete}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell text-center no-data" [attr.colspan]="displayedColumns.length">
                            Nessuna categoria inserita
                        </td>
                    </tr>

                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[20, 50, 100]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
