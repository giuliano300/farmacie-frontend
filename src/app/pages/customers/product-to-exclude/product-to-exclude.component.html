<header class="page-header-card">
    <div><span class="page-eyebrow">Regole di esclusione</span><h1>Prodotti da escludere<span *ngIf="customer?.customer?.name"> — {{customer?.customer?.name}}</span></h1><p>Gestisci i prodotti esclusi dalla sincronizzazione di {{customer?.customer?.name || 'questo cliente'}}.</p></div>
    <div class="header-actions"><button class="btn btn-primary" (click)="addProducts()"><i class="ri-add-line"></i> Aggiungi prodotti</button></div>
</header>
<mat-card
    class="trinta-card to-do-list-card mb-25 bg-white border-none d-block"
>
    <mat-card-content>
        <div class="search-box position-relative">
            <input
                type="search"
                class="d-block w-100 border-none outline-0"
                placeholder="Cerca per nome o AIC"
                aria-label="Cerca prodotto per nome o AIC"
                (input)="applyFilter($event)"
            >
            <button type="button" class="p-0 bg-transparent border-none" aria-label="Cerca">
                <i class="ri-search-line"></i>
            </button>
        </div>
        <div class="to-do-list-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <!-- Name Column -->
                    <ng-container matColumnDef="productName">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Nome
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Nome">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.productName}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="aic">
                        <th mat-header-cell *matHeaderCellDef class="pl-0 mini">
                            Aic
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0 mini" data-label="Aic">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.aic}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef class="text-center mini3 pr-0">
                            Azioni
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center mini3 pr-0" data-label="Azioni">
                            <div class="action">
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="elimina" matTooltipPosition="above" (click)="DeleteItem(element)">
                                    <i class="{{element.action.delete}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                    <tr class="mat-row" *matNoDataRow>
                        <td class="mat-cell text-center no-data" [attr.colspan]="displayedColumns.length">
                            Nessun prodotto inserito
                        </td>
                    </tr>

                </table>
            </div>
            <div class="progress">
                <mat-progress-bar *ngIf="firstLoading" mode="indeterminate"></mat-progress-bar>
            </div>

            <mat-paginator [pageSizeOptions]="[20, 50, 100]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
