<nav aria-label="breadcrumb" class="position-relative">
    <ol class="breadcrumb">
        <li aria-current="page" class="breadcrumb-item active">Fornitori</li>
    </ol>
</nav>
<mat-card
    class="trinta-card to-do-list-card mb-25 bg-white border-none d-block"
>
    <mat-card-content>
        <div class="to-do-list-table">
            <div class="table-responsive">
                <table mat-table [dataSource]="dataSource">

                    <!-- Name Column -->
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef class="pl-0 mini">
                            Id
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0 mini" data-label="Id">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.id}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Nome
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Nome">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                    {{element.name}}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="code">
                        <th mat-header-cell *matHeaderCellDef class="pl-0">
                            Codice
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0" data-label="Codice">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.code }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="active">
                        <th mat-header-cell *matHeaderCellDef class="pl-0 mini2">
                            Attivo
                        </th>
                        <td mat-cell *matCellDef="let element" class="pl-0 mini2" data-label="Attivo">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.active ? "SI": "NO" }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="lastUpdate">
                        <th mat-header-cell *matHeaderCellDef class="text-center pl-0 mini">
                            Ultimo aggiornamento
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pl-0 mini" data-label="Ultimo aggiornamento">
                            <div class="position-relative">
                                <h6 class="mt-0 mb-0">
                                   {{ element.lastUpdate ?? 'Nessun aggiornamento' }}
                                </h6>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="sincro">
                        <th mat-header-cell *matHeaderCellDef class="text-center pl-0 mini2">
                            Sincronizza
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0 mini2" data-label="Sincronizza">
                            <div class="action">
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="modifica" matTooltipPosition="above" (click)="updateSupplier(element.id)">
                                    <i class="{{element.sincro}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef class="text-center pr-0">
                            Azioni
                        </th>
                        <td mat-cell *matCellDef="let element" class="text-center pr-0" data-label="Azioni">
                            <div class="action">
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="modifica" matTooltipPosition="above" (click)="updateSupplier(element.id)">
                                    <i class="{{element.action.update}}"></i>
                                </button>
                                <button type="button" mat-button class="p-0 min-w-auto lh-1 h-auto" matTooltip="elimina" matTooltipPosition="above" (click)="DeleteItem(element)">
                                    <i class="{{element.action.delete}}"></i>
                                </button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>
            </div>
            <mat-paginator [pageSizeOptions]="[20, 50, 100]"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
