<section class="dashboard-overview" aria-labelledby="dashboard-title">
    <header class="dashboard-heading header-card">
        <div><span class="eyebrow">Panoramica operativa</span><h1 id="dashboard-title">Dashboard</h1><p>Dati aggiornati automaticamente sui batch di oggi.</p></div>
        <div class="live-status"><span></span> {{loading ? 'Caricamento' : 'Aggiornamento live'}}</div>
    </header>

    <div class="kpi-grid">
        <button type="button" class="kpi-card kpi-blue" (click)="openCustomers()"><div class="kpi-icon"><i class="ri-store-2-line"></i></div><div><span>Clienti attivi</span><strong>{{activeCustomers}}</strong><small>{{customers.length}} configurati</small></div><i class="ri-arrow-right-up-line card-arrow"></i></button>
        <button type="button" class="kpi-card kpi-violet" (click)="openBatches()"><div class="kpi-icon"><i class="ri-loader-4-line"></i></div><div><span>Batch in corso</span><strong>{{activeBatches.length}}</strong><small>apri gestione batch</small></div><i class="ri-arrow-right-up-line card-arrow"></i></button>
        <button type="button" class="kpi-card kpi-green" (click)="openBatches()"><div class="kpi-icon"><i class="ri-checkbox-circle-line"></i></div><div><span>Completati oggi</span><strong>{{completedBatches.length}}</strong><small>{{successRate}}% senza errori</small></div><i class="ri-arrow-right-up-line card-arrow"></i></button>
        <button type="button" class="kpi-card kpi-cyan" (click)="openBatches()"><div class="kpi-icon"><i class="ri-capsule-line"></i></div><div><span>Prodotti elaborati</span><strong>{{totalProductsToday | number:'1.0-0'}}</strong><small>vedi dettaglio batch</small></div><i class="ri-arrow-right-up-line card-arrow"></i></button>
        <button type="button" class="kpi-card" [class.kpi-red]="errorsToday > 0" [class.kpi-green]="errorsToday === 0" (click)="openBatches()"><div class="kpi-icon"><i class="ri-error-warning-line"></i></div><div><span>Errori rilevati</span><strong>{{errorsToday}}</strong><small>apri dettaglio anomalie</small></div><i class="ri-arrow-right-up-line card-arrow"></i></button>
    </div>

    <div class="updates-grid">
        <button type="button" class="update-card supplier-card" (click)="openSuppliers()">
            <div class="update-card-heading">
                <div class="update-icon"><i class="ri-truck-line"></i></div>
                <div><span class="eyebrow">Aggiornamenti fornitori</span><h2>Copertura {{supplierUpdateCoverage}}%</h2></div>
                <i class="ri-arrow-right-up-line update-arrow"></i>
            </div>
            <div class="mini-stats">
                <div><strong>{{activeSuppliers}}</strong><span>Attivi</span></div>
                <div><strong>{{suppliersUpdatedToday}}</strong><span>Aggiornati oggi</span></div>
                <div [class.has-warning]="suppliersWithoutUpdates > 0"><strong>{{suppliersWithoutUpdates}}</strong><span>Mai aggiornati</span></div>
            </div>
            <div class="update-track"><span [style.width.%]="supplierUpdateCoverage"></span></div>
        </button>

        <button type="button" class="update-card farmadati-card" (click)="openFarmadati()">
            <div class="update-card-heading">
                <div class="update-icon"><i class="ri-database-2-line"></i></div>
                <div><span class="eyebrow">Aggiornamento Farmadati</span><h2>{{farmadatiRunning > 0 ? 'Elaborazione in corso' : 'Stato aggiornamenti'}}</h2></div>
                <i class="ri-arrow-right-up-line update-arrow"></i>
            </div>
            <div class="mini-stats">
                <div><strong>{{farmadatiRunning}}</strong><span>In corso</span></div>
                <div><strong>{{farmadatiCompletedToday}}</strong><span>Completati oggi</span></div>
                <div><strong>{{farmadatiProductsToday | number:'1.0-0'}}</strong><span>Prodotti lavorati</span></div>
            </div>
            <div class="update-track"><span [style.width.%]="latestFarmadatiProgress"></span></div>
            <small class="progress-caption">Ultimo aggiornamento: {{latestFarmadatiProgress}}%</small>
        </button>
    </div>

    <div class="insight-grid">
        <button type="button" class="health-card" (click)="openBatches()">
            <div class="panel-title"><div><span class="eyebrow">Affidabilità giornaliera</span><h2>Stato sincronizzazioni</h2></div><strong class="health-score">{{successRate}}%</strong></div>
            <div class="health-track"><span [style.width.%]="successRate"></span></div>
            <div class="health-legend"><span><i class="dot success"></i>{{completedBatches.length}} completati</span><span><i class="dot running"></i>{{activeBatches.length}} in corso</span><span><i class="dot error"></i>{{failedClosedBatches.length + problematicActiveBatches.length}} con anomalie</span></div>
        </button>

        <article class="attention-card">
            <div class="panel-title"><div><span class="eyebrow">Centro anomalie</span><h2>Richiede attenzione</h2></div><span class="attention-count">{{attentionCount}}</span></div>
            <div class="attention-list" *ngIf="attentionCount > 0; else allGood">
                <button type="button" *ngFor="let item of problematicActiveBatches" (click)="openBatches()"><i class="ri-error-warning-fill critical"></i><span><strong>{{customerName(item)}}</strong><small>{{getBatchErrors(item)}} errori nel batch in corso</small></span><i class="ri-arrow-right-s-line arrow"></i></button>
                <button type="button" *ngFor="let item of failedClosedBatches" (click)="openBatches()"><i class="ri-close-circle-fill critical"></i><span><strong>{{customerName(item.batch)}}</strong><small>{{item.report?.errors}} errori nel batch concluso</small></span><i class="ri-arrow-right-s-line arrow"></i></button>
                <button type="button" *ngFor="let item of inactiveCustomers" (click)="openCustomers()"><i class="ri-pause-circle-fill warning"></i><span><strong>{{item.customer.name}}</strong><small>Cliente non attivo</small></span><i class="ri-arrow-right-s-line arrow"></i></button>
            </div>
            <ng-template #allGood><div class="all-good"><i class="ri-shield-check-line"></i><span><strong>Nessuna anomalia</strong><small>Tutti i sistemi risultano operativi.</small></span></div></ng-template>
        </article>
    </div>
</section>
