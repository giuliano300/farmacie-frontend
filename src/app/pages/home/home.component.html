<h1>Categorie</h1>
<div class="card-container">
    <mat-card class="example-card" *ngFor="let category of categories" (click)="goToCompare(category.id)">
        <mat-card-header>
        <mat-card-title>{{ category.name }}</mat-card-title>
        </mat-card-header>
    </mat-card>
    <div *ngIf="categories.length == 0">
        <div>nessuna categoria</div>
    </div>
</div>
