<h1 mat-dialog-title>Mappatura Producer</h1>
<div class="container" (click)="stopPropagation($event)">

  <!-- BOX SELEZIONE -->
  <div class="mapping-box">

    <!-- GESTIONALE -->
    <div class="field">
      <label>Producer Gestionale</label>

      <input
        type="text"
        [(ngModel)]="gestionaleSearch"
        (focus)="onGestionaleFocus()"
        (input)="onGestionaleSearch(gestionaleSearch)"
        placeholder="Cerca producer gestionale..."
      />

      <ul *ngIf="filteredGestionale.length" class="dropdown">
        <li *ngFor="let g of filteredGestionale"
            (click)="selectGestionale(g)">
          {{ g.label }}
        </li>
      </ul>
    </div>

    <!-- FRECCIA -->
    <div class="arrow">→</div>

    <!-- MAGENTO -->
    <div class="field">
      <label>Producer Magento</label>

      <input
        type="text"
        [(ngModel)]="magentoSearch"
        (focus)="onMagentoFocus()"
        (input)="onMagentoSearch(magentoSearch)"
        placeholder="Cerca producer Magento..."
      />

      <ul *ngIf="filteredMagento.length" class="dropdown">
        <li *ngFor="let m of filteredMagento"
            (click)="selectMagento(m)">
          {{ m.label }}
        </li>
      </ul>
    </div>

    <button mat-button class="btn" (click)="addMapping()">
      + Aggiungi
    </button>

  </div>

  <!-- LISTA -->
  <div class="list-box" *ngIf="mappings.length">

    <h3>Mapping creati</h3>

    <div *ngFor="let m of mappings; let i = index" class="mapping-row">

      <div class="tag gestionale">
        {{ getGestionaleLabel(m.gestionaleKey) }}
      </div>

      <div class="arrow-small">→</div>

      <div class="tag magento">
        {{ getMagentoLabel(m.magentoValue) }}
      </div>

      <button class="delete-btn" (click)="removeMapping(i)">✕</button>

    </div>

  </div>

  <button mat-button class="btn save" (click)="save()">
    Salva tutto
  </button>

</div>
