<mat-accordion>

  <mat-expansion-panel *ngFor="let group of groupedBatches"
  [expanded]="openedCustomers.has(group.customerId)"
  (opened)="openedCustomers.add(group.customerId)"
  (closed)="openedCustomers.delete(group.customerId)">

    <mat-expansion-panel-header>
      <mat-panel-title>
        {{group.customerId}}
      </mat-panel-title>

      <mat-panel-description>
        {{group.batches.length}} batch
      </mat-panel-description>
    </mat-expansion-panel-header>

    <!-- batch list -->

    <div *ngFor="let batch of group.batches" class="batch-row"
         (click)="toggle(batch)">

      <div class="batch-header">

        <span class="batch-id">
          Batch {{batch.sequenceNumber}}
        </span>

        <span class="status"
              [ngClass]="{
                running: batch.status === 'Running',
                completed: batch.status === 'Completed'
              }">

          {{batch.status}}

        </span>

      </div>

      <!-- dettaglio step -->

      <div *ngIf="isOpen(batch)" class="batch-details">

        <div class="step">
          <span>HeronImport</span>
          <mat-progress-bar
            mode="determinate"
            [value]="batch.heronImport.progress">
          </mat-progress-bar>
        </div>

        <div class="step">
          <span>Farmadati</span>
          <mat-progress-bar
            mode="determinate"
            [value]="batch.farmadati.progress">
          </mat-progress-bar>
        </div>

        <div class="step">
          <span>Suppliers</span>
          <mat-progress-bar
            mode="determinate"
            [value]="batch.suppliers.progress">
          </mat-progress-bar>
        </div>

        <div class="step">
          <span>Magento</span>

          <mat-progress-bar
            mode="determinate"
            [value]="batch.magento.progress">
          </mat-progress-bar>

          <small>
            {{batch.magento.success}} / {{batch.magento.total}}
            • errori {{batch.magento.errors}}
          </small>

        </div>

      </div>

    </div>

  </mat-expansion-panel>

</mat-accordion>
